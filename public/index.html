<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTask - Backend Proyekti</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Yeni Tapşırıq Əlavə Et</h2>
    <form action="/add-task" method="POST">
        <input type="text" name="taskTitle" placeholder="Tapşırıq adı..." required>
        <button type="submit">Əlavə Et</button>
    </form>
    <ul id="task-list"></ul>
</div>
<script src="script.js"></script>
</body>
</html>
